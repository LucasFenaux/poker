services:
  casino_backend:
    build: ./                 # Tells Docker to build the Dockerfile in this directory
    shm_size: '300gb'          # Replaces --shm-size="4g"
    deploy:
      resources:
        limits:
          memory: 400G
    ports:
      - "10001:10001"        # Replaces -p 10001:10001 (Ray Client)
      - "6379:6379"          # Replaces -p 6379:6379 (Ray GCS)
      - "8265:8265"          # Replaces -p 8265:8265 (Ray Dashboard)
    volumes:
      - "poker_results:/app/results"
    environment:
      - RAY_NUM_CPUS=9999
      - OBJECT_STORE_MEMORY_BYTES=250000000000 # 250GB for server
#      - OBJECT_STORE_MEMORY_BYTES=2500000000 # 2.5GB for laptop

    # stdin_open and tty replicate the "-it" flag so you can see the logs
    stdin_open: true
    tty: true

# --- SERVICE 2: TENSORBOARD ---
  tensorboard:
    build: ./
    ports:
      - "6006:6006"
    volumes:
      - "poker_results:/app/results"
    # The command goes HERE, so it only overrides the TensorBoard container
    command: >
      uv run tensorboard 
      --logdir=/app/results/tb_logs 
      --reload_multifile=true 
      --reload_interval=5 
      --host=0.0.0.0 
      --port=6006

volumes:
  poker_results: