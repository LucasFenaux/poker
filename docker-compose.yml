services:
  casino_backend:
    build: ./                 # Tells Docker to build the Dockerfile in this directory
    shm_size: '32gb'          # Replaces --shm-size="4g"
    ports:
      - "10001:10001"        # Replaces -p 10001:10001 (Ray Client)
      - "6379:6379"          # Replaces -p 6379:6379 (Ray GCS)
      - "8265:8265"          # Replaces -p 8265:8265 (Ray Dashboard)
    volumes:
      - "poker_results:/app/results"
    environment:
      - RAY_NUM_CPUS=9999
    # stdin_open and tty replicate the "-it" flag so you can see the logs
    stdin_open: true
    tty: true

# --- SERVICE 2: TENSORBOARD ---
  tensorboard:
    build: ./
    ports:
      - "6006:6006"
    volumes:
      - "poker_results:/app/results"
    # The command goes HERE, so it only overrides the TensorBoard container
    command: >
      uv run tensorboard 
      --logdir=/app/results 
      --reload_multifile=true 
      --reload_interval=5 
      --host=0.0.0.0 
      --port=6006

volumes:
  poker_results: